version = 1

# Project-owned configuration, build, and documentation files.
# These are not Java source and do not carry per-file SPDX comments;
# bulk-declared here per REUSE.software v3.3.
[[annotations]]
path = [
    "Makefile",
    "README.md",
    "AGENTS.md",
    ".gitignore",
    ".github/**",
    ".mvn/maven.config",
    "pom.xml",
    "**/pom.xml",
    "**/README.md",
    "spotbugs.xml",
    "**/*.properties",
    "**/*.yaml",
    "**/*.yml",
    "**/*.feature",
    "**/*.dump",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2014 Martin Paljak <martin@martinpaljak.net>"
SPDX-License-Identifier = "MIT"

# Maven Wrapper - vendored from the Apache Maven project (Apache-2.0).
[[annotations]]
path = [
    "mvnw",
    "mvnw.cmd",
    ".mvn/wrapper/**",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "The Apache Software Foundation"
SPDX-License-Identifier = "Apache-2.0"
