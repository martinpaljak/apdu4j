on:
  push:
    tags:
      - 'v*'
    branches:
      - master
      - next
  pull_request:
    branches:
      - master

permissions:
  contents: write

name: Build robot

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        java: [ 17, 21, 25 ]
    name: Java ${{ matrix.java }} build
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # To make git describe give the intended output
          fetch-tags: true
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
      - name: Package
        run: ./mvnw --no-transfer-progress -P exe -T1C -U -B clean verify
      - name: Release
        if: startsWith(github.ref, 'refs/tags/v') && matrix.java == '17'
        id: create_release
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: |
            tool/target/apdu4j.jar
            tool/target/apdu4j.exe
          fail_on_unmatched_files: true
          body: Release ${{ github.ref_name }}
          prerelease: true # manually promoted
      - name: Deploy package
        if: matrix.java == '17' && ( github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v') )
        uses: martinpaljak/maven-ssh-deploy@v1
        with:
          key: ${{ secrets.SSH_KEY }}
          user: mvn@mvn.javacard.pro
          host_fp: SHA256:auiF3nHWvDmvq2stDl+QEECCqMcDp+FY1/bDRnvxpRw
